name: CI/CD Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:  us-west-2
  APP_VERSION: "0.1"

jobs:
  # ── 0. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Dependencias y Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias (npm ci)
        run: npm ci

      - name: Verificar Angular CLI
        run: npx ng version

      - name: Ejecutar tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --no-progress

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-frontend
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ── 1. Build Dev ───────────────────────────────────────────────────────────
  build-dev:
    name: Build Dev
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Inyectar Mapbox token
        run: sed -i "s|\${MAPBOX_ACCESS_TOKEN}|${{ secrets.MAPBOX_ACCESS_TOKEN }}|g" src/environments/environment.ts

      - name: Build producción (dev)
        run: npm run build -- --configuration production --base-href /

      - name: Subir artefacto dev
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist/thaqhiri-frontend/browser
          retention-days: 1

  # ── 2. Build QA ────────────────────────────────────────────────────────────
  build-qa:
    name: Build QA
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Inyectar Mapbox token
        run: sed -i "s|\${MAPBOX_ACCESS_TOKEN}|${{ secrets.MAPBOX_ACCESS_TOKEN }}|g" src/environments/environment.qa.ts

      - name: Build QA
        run: npm run build -- --configuration qa --base-href /

      - name: Subir artefacto QA
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-qa
          path: dist/thaqhiri-frontend/browser
          retention-days: 1

  # ── 3. Build Prod ──────────────────────────────────────────────────────────
  build-prod:
    name: Build Prod
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Inyectar Mapbox token
        run: sed -i "s|\${MAPBOX_ACCESS_TOKEN}|${{ secrets.MAPBOX_ACCESS_TOKEN }}|g" src/environments/environment.prod.ts

      - name: Build Prod
        run: npm run build -- --configuration prod --base-href /

      - name: Subir artefacto Prod
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-prod
          path: dist/thaqhiri-frontend/browser
          retention-days: 1

  # ── 4. Deploy Dev ──────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: build-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Descargar artefacto dev
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publicar en S3 Dev
        run: |
          aws s3 sync dist/ s3://thaqhiri-dev-frontend-023894313590/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.map"

  # ── 5. Deploy QA ───────────────────────────────────────────────────────────
  deploy-qa:
    name: Deploy → QA
    needs: [build-qa, deploy-dev]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: qa
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Descargar artefacto QA
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-qa
          path: dist

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publicar en S3 QA
        run: |
          aws s3 sync dist/ s3://thaqhiri-qa-frontend-023894313590/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.map"

  # ── 6. Deploy Prod ─────────────────────────────────────────────────────────
  # Requiere aprobación manual en GitHub (environment protection rule)
  deploy-prod:
    name: Deploy → Prod
    needs: [build-prod, deploy-qa]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Descargar artefacto Prod
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-prod
          path: dist

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publicar en S3 Prod
        run: |
          aws s3 sync dist/ s3://thaqhiri-prod-frontend-023894313590/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.map"
