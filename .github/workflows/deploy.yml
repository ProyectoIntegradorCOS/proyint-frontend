name: CI/CD Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION:   us-west-2
  S3_BUCKET:    thaqhiri-dev-frontend-023894313590
  APP_VERSION:  "0.1"

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build -- --configuration production --base-href /

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/thaqhiri-frontend/browser
          retention-days: 1

  deploy:
    name: Publicar en S3
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Descargar artefacto de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publicar en S3
        run: |
          VERSION="${{ env.APP_VERSION }}.${{ github.run_number }}"
          echo "Publicando versión $VERSION en s3://${{ env.S3_BUCKET }}/"
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.map"
          echo "✔ Frontend publicado:"
          echo "  → s3://${{ env.S3_BUCKET }}/ (v$VERSION)"
