name: CI/CD Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:  us-west-2
  APP_VERSION: "0.1"

jobs:
  # ── 1. Build Dev ───────────────────────────────────────────────────────────
  build-dev:
    name: Build Dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Inyectar Mapbox token
        run: sed -i "s|\${MAPBOX_ACCESS_TOKEN}|${{ secrets.MAPBOX_ACCESS_TOKEN }}|g" src/environments/environment.ts

      - name: Build producción (dev)
        run: npm run build -- --configuration production --base-href /thaqhiri/

      - name: Subir artefacto dev
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist/thaqhiri-frontend/browser
          retention-days: 1

  # ── 2. Build QA ────────────────────────────────────────────────────────────
  build-qa:
    name: Build QA
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Inyectar Mapbox token
        run: sed -i "s|\${MAPBOX_ACCESS_TOKEN}|${{ secrets.MAPBOX_ACCESS_TOKEN }}|g" src/environments/environment.qa.ts

      - name: Build QA
        run: npm run build -- --configuration qa --base-href /thaqhiri/

      - name: Subir artefacto QA
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-qa
          path: dist/thaqhiri-frontend/browser
          retention-days: 1

  # ── 3. Deploy Dev ──────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: build-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Descargar artefacto dev
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publicar en S3 Dev
        run: |
          aws s3 sync dist/ s3://thaqhiri-dev-frontend-023894313590/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.map"

  # ── 4. Deploy QA ───────────────────────────────────────────────────────────
  deploy-qa:
    name: Deploy → QA
    needs: [build-qa, deploy-dev]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: qa
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Descargar artefacto QA
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-qa
          path: dist

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publicar en S3 QA
        run: |
          aws s3 sync dist/ s3://thaqhiri-qa-frontend-023894313590/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.map"
