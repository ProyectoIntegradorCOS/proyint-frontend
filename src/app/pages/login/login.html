<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <img src="assets/logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
      <h1 class="login-title">Thaqhiri</h1>
      <p class="login-subtitle">Sistema de Seguimiento de Verificadores</p>
    </div>

    <div class="login-form">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input
          id="usuario"
          type="text"
          [(ngModel)]="usuario"
          (keydown)="onKeyDown($event)"
          placeholder="Ingrese su usuario"
          [disabled]="loading"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="clave">Contraseña</label>
        <input
          id="clave"
          type="password"
          [(ngModel)]="clave"
          (keydown)="onKeyDown($event)"
          placeholder="Ingrese su contraseña"
          [disabled]="loading"
          autocomplete="current-password"
        />
      </div>

      <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>

      <button
        class="login-btn"
        (click)="login()"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading">Iniciando sesión...</span>
      </button>
    </div>

  </div>
</div>
